  <g stroke="#f6d36b" stroke-width="5" stroke-linecap="round" opacity="0.86">
    <path d="M224 486l-14-18"/>
    <path d="M306 477l2-22"/>
    <path d="M594 475l-1-23"/>
    <path d="M668 486l16-18"/>
