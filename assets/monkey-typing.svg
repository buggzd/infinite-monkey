<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">A monkey typing endlessly on a keyboard</title>
  <desc id="desc">Animated SVG illustration of a monkey hammering a keyboard while AI poem tokens float upward.</desc>
  <defs>
    <linearGradient id="desk" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#7c5240"/>
      <stop offset="1" stop-color="#3c2b26"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="1">
      <stop offset="0" stop-color="#18242f"/>
      <stop offset="1" stop-color="#243f4a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#09090b" flood-opacity="0.36"/>
    </filter>
    <style>
      .arm-left {
        transform-origin: 360px 420px;
        animation: leftTap 0.52s ease-in-out infinite;
      }

      .arm-right {
        transform-origin: 602px 420px;
        animation: rightTap 0.52s ease-in-out infinite;
      }

      .hand-left {
        animation: leftHand 0.52s ease-in-out infinite;
      }

      .hand-right {
        animation: rightHand 0.52s ease-in-out infinite;
      }

      .key-left {
        animation: keyPress 0.52s ease-in-out infinite;
      }

      .key-right {
        animation: keyPress 0.52s ease-in-out infinite 0.26s;
      }

      .cursor {
        animation: blink 0.8s steps(1, end) infinite;
      }

      .token {
        opacity: 0;
        animation: floatToken 3.8s ease-in-out infinite;
      }

      .token:nth-of-type(2) { animation-delay: 0.55s; }
      .token:nth-of-type(3) { animation-delay: 1.1s; }
      .token:nth-of-type(4) { animation-delay: 1.65s; }
      .token:nth-of-type(5) { animation-delay: 2.2s; }
      .token:nth-of-type(6) { animation-delay: 2.75s; }

      .dice {
        transform-origin: 736px 548px;
        animation: diceRoll 1.6s ease-in-out infinite;
      }

      .paper-line {
        transform-origin: 653px 150px;
        animation: poemWrite 2.4s ease-in-out infinite;
      }

      @keyframes leftTap {
        0%, 100% { transform: rotate(-5deg) translateY(0); }
        50% { transform: rotate(9deg) translateY(18px); }
      }

      @keyframes rightTap {
        0%, 100% { transform: rotate(8deg) translateY(18px); }
        50% { transform: rotate(-6deg) translateY(0); }
      }

      @keyframes leftHand {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(20px); }
      }

      @keyframes rightHand {
        0%, 100% { transform: translateY(18px); }
        50% { transform: translateY(0); }
      }

      @keyframes keyPress {
        0%, 100% { transform: translateY(0); fill: #d8c5a0; }
        50% { transform: translateY(8px); fill: #ffc95b; }
      }

      @keyframes blink {
        0%, 48% { opacity: 1; }
        49%, 100% { opacity: 0; }
      }

      @keyframes floatToken {
        0% { opacity: 0; transform: translateY(22px) scale(0.92); }
        18% { opacity: 1; }
        74% { opacity: 0.9; }
        100% { opacity: 0; transform: translateY(-74px) scale(1.08); }
      }

      @keyframes diceRoll {
        0%, 100% { transform: rotate(-10deg) translateY(0); }
        50% { transform: rotate(15deg) translateY(-12px); }
      }

      @keyframes poemWrite {
        0% { stroke-dasharray: 0 180; }
        48%, 100% { stroke-dasharray: 180 180; }
      }
    </style>
  </defs>

  <rect width="960" height="720" fill="#11131a"/>
  <circle cx="180" cy="140" r="118" fill="#365162" opacity="0.34"/>
  <circle cx="788" cy="180" r="152" fill="#734f3e" opacity="0.22"/>
  <path d="M88 589h784c32 0 58 26 58 58v73H30v-73c0-32 26-58 58-58z" fill="url(#desk)"/>
  <path d="M72 610h816" stroke="#9a735f" stroke-width="8" stroke-linecap="round" opacity="0.45"/>

  <g filter="url(#softShadow)">
    <rect x="535" y="106" width="260" height="230" rx="18" fill="#171717"/>
    <rect x="553" y="124" width="224" height="174" rx="10" fill="url(#screen)"/>
    <rect x="620" y="329" width="90" height="28" rx="7" fill="#242424"/>
    <path d="M586 367h168l20 26H566z" fill="#202020"/>
    <text x="578" y="165" fill="#ffd76a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">theme = dice()</text>
    <text x="578" y="198" fill="#8be9bd" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">首字: 月</text>
    <text x="578" y="231" fill="#8be9bd" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">二字: 荒</text>
    <text x="578" y="264" fill="#f5efe2" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">tokens += poem</text>
    <rect class="cursor" x="733" y="248" width="10" height="21" fill="#f5efe2"/>
  </g>

  <g class="token" transform="translate(172 218)">
    <rect width="86" height="36" rx="18" fill="#f4c35e"/>
    <text x="43" y="24" text-anchor="middle" fill="#2a2018" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">+128</text>
  </g>
  <g class="token" transform="translate(720 424)">
    <rect width="78" height="34" rx="17" fill="#85d6c5"/>
    <text x="39" y="23" text-anchor="middle" fill="#102824" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">意义?</text>
  </g>
  <g class="token" transform="translate(300 116)">
    <rect width="72" height="34" rx="17" fill="#f0937b"/>
    <text x="36" y="23" text-anchor="middle" fill="#321914" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">诗</text>
  </g>
  <g class="token" transform="translate(806 292)">
    <rect width="88" height="36" rx="18" fill="#b6d88a"/>
    <text x="44" y="24" text-anchor="middle" fill="#1f2a14" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">loop</text>
  </g>
  <g class="token" transform="translate(80 402)">
    <rect width="100" height="36" rx="18" fill="#cbb6ff"/>
    <text x="50" y="24" text-anchor="middle" fill="#211735" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">$0.03</text>
  </g>
  <g class="token" transform="translate(452 76)">
    <rect width="92" height="34" rx="17" fill="#f2efe6"/>
    <text x="46" y="23" text-anchor="middle" fill="#26211c" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">再来</text>
  </g>

  <g transform="translate(185 128)" filter="url(#softShadow)">
    <path d="M114 154c-38-42-39-89-17-118 30-40 91-31 116 21 29-50 90-53 118-10 21 32 13 77-24 111 14 18 22 40 22 64 0 75-61 136-136 136S57 297 57 222c0-26 8-50 23-70z" fill="#7a4d32"/>
    <circle cx="101" cy="88" r="54" fill="#6b402b"/>
    <circle cx="294" cy="94" r="54" fill="#6b402b"/>
    <ellipse cx="198" cy="211" rx="112" ry="119" fill="#8b5839"/>
    <ellipse cx="198" cy="230" rx="78" ry="70" fill="#d3a678"/>
    <ellipse cx="160" cy="189" rx="18" ry="23" fill="#211815"/>
    <ellipse cx="236" cy="189" rx="18" ry="23" fill="#211815"/>
    <circle cx="166" cy="181" r="6" fill="#fff8e9"/>
    <circle cx="242" cy="181" r="6" fill="#fff8e9"/>
    <ellipse cx="198" cy="224" rx="24" ry="18" fill="#5a3527"/>
    <path d="M162 255c19 24 55 27 77 0" fill="none" stroke="#4b2c22" stroke-width="8" stroke-linecap="round"/>
    <path d="M197 304c-72 3-127 53-135 126l270 1c-8-75-63-130-135-127z" fill="#7a4d32"/>
  </g>

  <g class="arm-left">
    <path d="M323 414c-42 19-70 51-86 96" fill="none" stroke="#7a4d32" stroke-width="46" stroke-linecap="round"/>
    <ellipse class="hand-left" cx="229" cy="522" rx="35" ry="24" fill="#d3a678" transform="rotate(-18 229 522)"/>
  </g>
  <g class="arm-right">
    <path d="M565 414c46 15 78 45 96 91" fill="none" stroke="#7a4d32" stroke-width="46" stroke-linecap="round"/>
    <ellipse class="hand-right" cx="670" cy="517" rx="35" ry="24" fill="#d3a678" transform="rotate(16 670 517)"/>
  </g>

  <g filter="url(#softShadow)">
    <path d="M212 524h496c22 0 40 18 40 40v37H172v-37c0-22 18-40 40-40z" fill="#22252d"/>
    <path d="M204 578h520" stroke="#0d0e12" stroke-width="8" stroke-linecap="round" opacity="0.46"/>
    <g fill="#f0e3c9">
      <rect x="234" y="546" width="46" height="32" rx="6"/>
      <rect x="291" y="546" width="46" height="32" rx="6"/>
      <rect x="348" y="546" width="46" height="32" rx="6"/>
      <rect x="405" y="546" width="46" height="32" rx="6"/>
      <rect x="462" y="546" width="46" height="32" rx="6"/>
      <rect x="519" y="546" width="46" height="32" rx="6"/>
      <rect x="576" y="546" width="46" height="32" rx="6"/>
      <rect x="633" y="546" width="46" height="32" rx="6"/>
      <rect x="262" y="586" width="74" height="30" rx="6"/>
      <rect x="349" y="586" width="200" height="30" rx="6"/>
      <rect x="562" y="586" width="102" height="30" rx="6"/>
    </g>
    <rect class="key-left" x="291" y="546" width="46" height="32" rx="6"/>
    <rect class="key-right" x="633" y="546" width="46" height="32" rx="6"/>
  </g>

  <g transform="translate(84 96)">
    <path d="M0 0h128c13 0 24 11 24 24v122c0 13-11 24-24 24H0c-13 0-24-11-24-24V24C-24 11-13 0 0 0z" fill="#f4efe5" opacity="0.93"/>
    <path class="paper-line" d="M10 42h94" stroke="#2d3944" stroke-width="7" stroke-linecap="round"/>
    <path class="paper-line" d="M10 76h108" stroke="#2d3944" stroke-width="7" stroke-linecap="round" style="animation-delay:.45s"/>
    <path class="paper-line" d="M10 110h86" stroke="#2d3944" stroke-width="7" stroke-linecap="round" style="animation-delay:.9s"/>
    <text x="66" y="152" text-anchor="middle" fill="#b04c37" font-family="ui-serif, Georgia, serif" font-size="24">月荒诗</text>
  </g>

  <g class="dice" transform="translate(706 512)" filter="url(#softShadow)">
    <rect width="80" height="80" rx="16" fill="#f7efe0"/>
    <circle cx="24" cy="24" r="7" fill="#20242a"/>
    <circle cx="56" cy="24" r="7" fill="#20242a"/>
    <circle cx="40" cy="40" r="7" fill="#20242a"/>
    <circle cx="24" cy="56" r="7" fill="#20242a"/>
    <circle cx="56" cy="56" r="7" fill="#20242a"/>
  </g>
</svg>
