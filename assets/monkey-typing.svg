<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">A monkey typing endlessly on a keyboard</title>
  <desc id="desc">Animated SVG illustration of a monkey leaning over a keyboard and rapidly typing AI poetry.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#10151d"/>
      <stop offset="0.55" stop-color="#17151b"/>
      <stop offset="1" stop-color="#241a17"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#8b5a42"/>
      <stop offset="1" stop-color="#4a2e27"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="1">
      <stop offset="0" stop-color="#183142"/>
      <stop offset="1" stop-color="#254d4d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#06070a" flood-opacity="0.38"/>
    </filter>
    <style>
      .head {
        transform-origin: 420px 260px;
        animation: headBob 0.82s ease-in-out infinite;
      }

      .left-arm {
        transform-origin: 328px 414px;
        animation: leftArmTap 0.46s ease-in-out infinite;
      }

      .right-arm {
        transform-origin: 515px 414px;
        animation: rightArmTap 0.46s ease-in-out infinite;
      }

      .left-hand {
        transform-origin: 292px 527px;
        animation: leftHandTap 0.46s ease-in-out infinite;
      }

      .right-hand {
        transform-origin: 593px 527px;
        animation: rightHandTap 0.46s ease-in-out infinite;
      }

      .left-finger-a,
      .right-finger-b {
        animation: fingerTap 0.46s ease-in-out infinite;
      }

      .left-finger-b,
      .right-finger-a {
        animation: fingerTap 0.46s ease-in-out infinite 0.23s;
      }

      .pressed-left {
        animation: keyPress 0.46s ease-in-out infinite;
      }

      .pressed-right {
        animation: keyPress 0.46s ease-in-out infinite 0.23s;
      }

      .tail {
        transform-origin: 616px 412px;
        animation: tailWag 1.35s ease-in-out infinite;
      }

      .cursor {
        animation: blink 0.8s steps(1, end) infinite;
      }

      .token {
        opacity: 0;
        animation: floatToken 3.6s ease-in-out infinite;
      }

      .token-two { animation-delay: 0.6s; }
      .token-three { animation-delay: 1.2s; }
      .token-four { animation-delay: 1.8s; }

      .dice {
        transform-origin: 774px 552px;
        animation: diceRoll 1.5s ease-in-out infinite;
      }

      .poem-line {
        animation: writeLine 2.4s ease-in-out infinite;
      }

      @keyframes headBob {
        0%, 100% { transform: translateY(0) rotate(-1deg); }
        50% { transform: translateY(7px) rotate(1deg); }
      }

      @keyframes leftArmTap {
        0%, 100% { transform: rotate(-2deg) translateY(0); }
        50% { transform: rotate(5deg) translateY(10px); }
      }

      @keyframes rightArmTap {
        0%, 100% { transform: rotate(4deg) translateY(9px); }
        50% { transform: rotate(-3deg) translateY(0); }
      }

      @keyframes leftHandTap {
        0%, 100% { transform: translateY(0) rotate(-4deg); }
        50% { transform: translateY(10px) rotate(2deg); }
      }

      @keyframes rightHandTap {
        0%, 100% { transform: translateY(9px) rotate(4deg); }
        50% { transform: translateY(0) rotate(-2deg); }
      }

      @keyframes fingerTap {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(8px); }
      }

      @keyframes keyPress {
        0%, 100% { transform: translateY(0); fill: #f1dfbd; }
        50% { transform: translateY(7px); fill: #ffc95b; }
      }

      @keyframes tailWag {
        0%, 100% { transform: rotate(-5deg); }
        50% { transform: rotate(9deg); }
      }

      @keyframes blink {
        0%, 48% { opacity: 1; }
        49%, 100% { opacity: 0; }
      }

      @keyframes floatToken {
        0% { opacity: 0; transform: translateY(24px) scale(0.92); }
        18% { opacity: 1; }
        74% { opacity: 0.9; }
        100% { opacity: 0; transform: translateY(-74px) scale(1.08); }
      }

      @keyframes diceRoll {
        0%, 100% { transform: rotate(-12deg) translateY(0); }
        50% { transform: rotate(16deg) translateY(-12px); }
      }

      @keyframes writeLine {
        0% { stroke-dasharray: 0 170; }
        55%, 100% { stroke-dasharray: 170 170; }
      }
    </style>
  </defs>

  <rect width="960" height="720" fill="url(#bg)"/>
  <circle cx="176" cy="136" r="120" fill="#385569" opacity="0.28"/>
  <circle cx="774" cy="165" r="138" fill="#745143" opacity="0.2"/>
  <path d="M72 592h816c34 0 62 28 62 62v66H10v-66c0-34 28-62 62-62z" fill="url(#desk)"/>
  <path d="M80 618h800" stroke="#a97961" stroke-width="8" stroke-linecap="round" opacity="0.45"/>

  <g filter="url(#shadow)">
    <rect x="598" y="102" width="264" height="226" rx="18" fill="#171717"/>
    <rect x="616" y="121" width="228" height="167" rx="10" fill="url(#screen)"/>
    <rect x="684" y="322" width="94" height="28" rx="7" fill="#232323"/>
    <path d="M642 360h178l22 27H620z" fill="#202020"/>
    <text x="642" y="162" fill="#ffd76a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">theme = dice()</text>
    <text x="642" y="196" fill="#8be9bd" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">首字: 月</text>
    <text x="642" y="230" fill="#8be9bd" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">二字: 荒</text>
    <text x="642" y="264" fill="#f5efe2" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">tokens += poem</text>
    <rect class="cursor" x="798" y="247" width="10" height="21" fill="#f5efe2"/>
  </g>

  <g transform="translate(86 96)" filter="url(#shadow)">
    <path d="M0 0h132c14 0 25 11 25 25v128c0 14-11 25-25 25H0c-14 0-25-11-25-25V25C-25 11-14 0 0 0z" fill="#f4efe5"/>
    <path class="poem-line" d="M16 42h102" stroke="#2d3944" stroke-width="7" stroke-linecap="round"/>
    <path class="poem-line" d="M16 78h112" stroke="#2d3944" stroke-width="7" stroke-linecap="round" style="animation-delay:.42s"/>
    <path class="poem-line" d="M16 114h86" stroke="#2d3944" stroke-width="7" stroke-linecap="round" style="animation-delay:.84s"/>
    <text x="66" y="158" text-anchor="middle" fill="#b04c37" font-family="ui-serif, Georgia, serif" font-size="25">月荒诗</text>
  </g>

  <g class="token" transform="translate(168 278)">
    <rect width="92" height="36" rx="18" fill="#f4c35e"/>
    <text x="46" y="24" text-anchor="middle" fill="#2a2018" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">+128</text>
  </g>
  <g class="token token-two" transform="translate(732 422)">
    <rect width="84" height="34" rx="17" fill="#85d6c5"/>
    <text x="42" y="23" text-anchor="middle" fill="#102824" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">意义?</text>
  </g>
  <g class="token token-three" transform="translate(370 108)">
    <rect width="72" height="34" rx="17" fill="#f0937b"/>
    <text x="36" y="23" text-anchor="middle" fill="#321914" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">诗</text>
  </g>
  <g class="token token-four" transform="translate(808 272)">
    <rect width="88" height="36" rx="18" fill="#b6d88a"/>
    <text x="44" y="24" text-anchor="middle" fill="#1f2a14" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">loop</text>
  </g>

  <path class="tail" d="M582 420c72-42 150 22 130 94-14 51-77 53-90 12-11-36 31-53 57-35" fill="none" stroke="#8b5839" stroke-width="38" stroke-linecap="round"/>
  <path class="tail" d="M582 420c72-42 150 22 130 94-14 51-77 53-90 12-11-36 31-53 57-35" fill="none" stroke="#b78358" stroke-width="14" stroke-linecap="round" opacity="0.75"/>

  <g filter="url(#shadow)">
    <ellipse cx="426" cy="452" rx="156" ry="124" fill="#7a4d32"/>
    <path d="M292 510c16-82 71-132 134-132 66 0 124 53 141 132z" fill="#8b5839"/>
  </g>

  <g class="head" filter="url(#shadow)">
    <circle cx="294" cy="244" r="66" fill="#70452e"/>
    <circle cx="294" cy="244" r="38" fill="#d3a678"/>
    <circle cx="548" cy="244" r="66" fill="#70452e"/>
    <circle cx="548" cy="244" r="38" fill="#d3a678"/>
    <ellipse cx="421" cy="272" rx="138" ry="126" fill="#8b5839"/>
    <path d="M365 142c16 22 37 28 64 23-10 16-7 31 10 45-33-1-62-12-86-34z" fill="#7a4d32"/>
    <ellipse cx="421" cy="306" rx="86" ry="69" fill="#d3a678"/>
    <ellipse cx="378" cy="264" rx="24" ry="31" fill="#1d1614"/>
    <ellipse cx="464" cy="264" rx="24" ry="31" fill="#1d1614"/>
    <circle cx="386" cy="252" r="7" fill="#fff8e9"/>
    <circle cx="472" cy="252" r="7" fill="#fff8e9"/>
    <path d="M356 230c21-17 44-18 59-4" fill="none" stroke="#523122" stroke-width="8" stroke-linecap="round"/>
    <path d="M430 226c20-14 43-12 58 6" fill="none" stroke="#523122" stroke-width="8" stroke-linecap="round"/>
    <ellipse cx="421" cy="309" rx="32" ry="23" fill="#5a3527"/>
    <circle cx="408" cy="306" r="5" fill="#271a16"/>
    <circle cx="434" cy="306" r="5" fill="#271a16"/>
    <path d="M373 344c27 29 72 29 99 0" fill="none" stroke="#4b2c22" stroke-width="9" stroke-linecap="round"/>
  </g>

  <g class="left-arm">
    <path d="M323 416c-72 20-111 58-128 112" fill="none" stroke="#7a4d32" stroke-width="42" stroke-linecap="round"/>
    <path d="M324 414c-63 19-98 52-114 98" fill="none" stroke="#9b6842" stroke-width="18" stroke-linecap="round" opacity="0.7"/>
  </g>
  <g class="right-arm">
    <path d="M520 416c76 19 123 55 142 111" fill="none" stroke="#7a4d32" stroke-width="42" stroke-linecap="round"/>
    <path d="M520 414c68 19 109 51 126 99" fill="none" stroke="#9b6842" stroke-width="18" stroke-linecap="round" opacity="0.7"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M186 506h578c26 0 47 21 47 47v55H139v-55c0-26 21-47 47-47z" fill="#22252d"/>
    <path d="M174 602h602" stroke="#0d0e12" stroke-width="8" stroke-linecap="round" opacity="0.48"/>
    <g fill="#f1dfbd">
      <rect x="213" y="530" width="52" height="34" rx="7"/>
      <rect x="276" y="530" width="52" height="34" rx="7"/>
      <rect x="339" y="530" width="52" height="34" rx="7"/>
      <rect x="402" y="530" width="52" height="34" rx="7"/>
      <rect x="465" y="530" width="52" height="34" rx="7"/>
      <rect x="528" y="530" width="52" height="34" rx="7"/>
      <rect x="591" y="530" width="52" height="34" rx="7"/>
      <rect x="654" y="530" width="52" height="34" rx="7"/>
      <rect x="240" y="574" width="86" height="32" rx="7"/>
      <rect x="340" y="574" width="216" height="32" rx="7"/>
      <rect x="570" y="574" width="114" height="32" rx="7"/>
    </g>
    <rect class="pressed-left" x="276" y="530" width="52" height="34" rx="7"/>
    <rect class="pressed-right" x="591" y="530" width="52" height="34" rx="7"/>
    <rect class="pressed-left" x="340" y="574" width="216" height="32" rx="7" style="animation-delay:.12s"/>
  </g>

  <g class="left-hand">
    <ellipse cx="278" cy="520" rx="52" ry="30" fill="#d3a678" transform="rotate(-8 278 520)"/>
    <ellipse class="left-finger-a" cx="238" cy="511" rx="13" ry="28" fill="#d3a678" transform="rotate(-28 238 511)"/>
    <ellipse class="left-finger-b" cx="267" cy="505" rx="13" ry="29" fill="#d3a678" transform="rotate(-13 267 505)"/>
    <ellipse class="left-finger-a" cx="297" cy="507" rx="13" ry="28" fill="#d3a678" transform="rotate(4 297 507)"/>
    <ellipse class="left-finger-b" cx="323" cy="517" rx="12" ry="25" fill="#d3a678" transform="rotate(23 323 517)"/>
    <path d="M234 535c29 14 63 13 91-3" fill="none" stroke="#8b5a42" stroke-width="5" stroke-linecap="round" opacity="0.65"/>
  </g>

  <g class="right-hand">
    <ellipse cx="611" cy="520" rx="52" ry="30" fill="#d3a678" transform="rotate(8 611 520)"/>
    <ellipse class="right-finger-a" cx="568" cy="518" rx="13" ry="26" fill="#d3a678" transform="rotate(-24 568 518)"/>
