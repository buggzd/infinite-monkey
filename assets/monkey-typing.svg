<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">A cyber monkey typing endlessly on a glowing keyboard</title>
  <desc id="desc">Animated SVG illustration of a stylized monkey frantically typing, with glowing tokens erupting from the keyboard.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f1117" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-small" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <style>
      .spin-slow { transform-origin: 480px 360px; animation: spin 24s linear infinite; }
      .spin-reverse { transform-origin: 480px 360px; animation: spinReverse 18s linear infinite; }
      .spin-fast { transform-origin: 480px 360px; animation: spin 12s linear infinite; }
      
      .arm-left { transform-origin: 320px 340px; animation: typeLeft 0.3s infinite; }
      .arm-right { transform-origin: 350px 360px; animation: typeRight 0.35s infinite; }
      
      .tail { transform-origin: 220px 550px; animation: tailSway 4s ease-in-out infinite; }
      .eye { transform-origin: 370px 255px; animation: eyeBlink 5s infinite; }
      .head { transform-origin: 320px 320px; animation: headBob 0.6s infinite alternate ease-in-out; }
      
      @keyframes spin { 100% { transform: rotate(360deg); } }
      @keyframes spinReverse { 100% { transform: rotate(-360deg); } }
      
      @keyframes typeLeft {
        0%, 100% { transform: rotate(0deg); }
        33% { transform: rotate(8deg) translateY(6px); }
        66% { transform: rotate(-4deg) translateY(-4px); }
      }
      @keyframes typeRight {
        0%, 100% { transform: rotate(0deg); }
        33% { transform: rotate(-6deg) translateY(-5px); }
        66% { transform: rotate(10deg) translateY(8px); }
      }
      @keyframes tailSway {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(8deg) translateX(4px); }
      }
      @keyframes eyeBlink {
        0%, 94%, 100% { transform: scaleY(1); }
        97% { transform: scaleY(0.1); }
      }
      @keyframes headBob {
        0% { transform: rotate(-2deg); }
        100% { transform: rotate(2deg); }
      }
      
      @keyframes flash {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
      .key-flash-1 { animation: flash 0.2s infinite; }
      .key-flash-2 { animation: flash 0.3s infinite 0.1s; }
      .key-flash-3 { animation: flash 0.25s infinite 0.15s; }
      .key-flash-4 { animation: flash 0.35s infinite 0.05s; }
      
      .bonfire text {
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 800;
        opacity: 0;
      }
      .p1 { fill: #38bdf8; font-size: 32px; animation: fly1 2s ease-out infinite; }
      .p2 { fill: #f472b6; font-size: 40px; animation: fly2 2.5s ease-out infinite 0.2s; }
      .p3 { fill: #818cf8; font-size: 28px; animation: fly3 2.2s ease-out infinite 0.5s; }
      .p4 { fill: #38bdf8; font-size: 20px; animation: fly4 2.8s ease-out infinite 0.1s; }
      .p5 { fill: #f472b6; font-size: 24px; animation: fly5 1.9s ease-out infinite 0.7s; }
      .p6 { fill: #818cf8; font-size: 22px; animation: fly1 2.3s ease-out infinite 0.4s; }
      .p7 { fill: #e2e8f0; font-size: 36px; animation: fly2 2.6s ease-out infinite 0.8s; }
      .p8 { fill: #38bdf8; font-size: 18px; animation: fly3 1.5s ease-out infinite 0.3s; }
      .p9 { fill: #f472b6; font-size: 18px; animation: fly4 1.7s ease-out infinite 0.6s; }
      
      @keyframes fly1 {
        0% { transform: translate(0, 0) scale(0.5) rotate(0deg); opacity: 0; }
        15% { opacity: 1; }
        100% { transform: translate(-120px, -280px) scale(1.5) rotate(-45deg); opacity: 0; }
      }
      @keyframes fly2 {
        0% { transform: translate(0, 0) scale(0.5) rotate(0deg); opacity: 0; }
        15% { opacity: 1; }
        100% { transform: translate(80px, -320px) scale(1.8) rotate(30deg); opacity: 0; }
      }
      @keyframes fly3 {
        0% { transform: translate(0, 0) scale(0.5) rotate(0deg); opacity: 0; }
        15% { opacity: 1; }
        100% { transform: translate(150px, -250px) scale(1.2) rotate(60deg); opacity: 0; }
      }
      @keyframes fly4 {
        0% { transform: translate(0, 0) scale(0.5) rotate(0deg); opacity: 0; }
        15% { opacity: 1; }
        100% { transform: translate(-60px, -300px) scale(2) rotate(-20deg); opacity: 0; }
      }
      @keyframes fly5 {
        0% { transform: translate(0, 0) scale(0.5) rotate(0deg); opacity: 0; }
        15% { opacity: 1; }
        100% { transform: translate(40px, -260px) scale(1.4) rotate(15deg); opacity: 0; }
      }
      
      .code-line {
        stroke-dasharray: 40;
        animation: scrollCode 1s linear infinite;
      }
      @keyframes scrollCode {
        to { stroke-dashoffset: -80; }
      }
    </style>
  </defs>

  <script><![CDATA[
    (function () {
      const ranges = [
        [0x4e00, 0x9fa5],
        [0x3041, 0x3096],
        [0x30a1, 0x30fa],
        [0x0041, 0x005a],
        [0x0061, 0x007a],
        [0x0030, 0x0039]
      ];
      const extras = ["∞", "?", "!", "+", "#", "$"];

      function fromRange(start, end) {
        const code = start + Math.floor(Math.random() * (end - start + 1));
        return String.fromCharCode(code);
      }

      function pickGlyph() {
        if (Math.random() < 0.12) {
          return extras[Math.floor(Math.random() * extras.length)];
        }
        const range = ranges[Math.floor(Math.random() * ranges.length)];
        return fromRange(range[0], range[1]);
      }

      function refresh() {
        document.querySelectorAll(".bonfire text").forEach((node) => {
          node.textContent = pickGlyph();
        });
      }

      refresh();
      window.setInterval(refresh, 420);
    }());
  ]]></script>

  <!-- Background -->
  <rect width="960" height="720" fill="url(#bgGlow)" />

  <!-- Infinite Loop Rings -->
  <g opacity="0.35">
    <circle cx="480" cy="360" r="260" fill="none" stroke="#818cf8" stroke-width="2" stroke-dasharray="10 30" class="spin-slow" />
    <circle cx="480" cy="360" r="240" fill="none" stroke="#38bdf8" stroke-width="1" class="spin-reverse" stroke-dasharray="100 20" />
    <circle cx="480" cy="360" r="280" fill="none" stroke="#f472b6" stroke-width="4" stroke-dasharray="4 40" class="spin-fast" />
  </g>

  <!-- Desk -->
  <rect x="0" y="600" width="960" height="120" fill="#0b0f19" />
  <line x1="0" y1="600" x2="960" y2="600" stroke="#38bdf8" stroke-width="2" opacity="0.4"/>

  <!-- Left Arm (Background) -->
  <g class="arm-left">
    <path d="M 320 340 L 400 470 L 520 570" fill="none" stroke="#0b0f19" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="520" cy="570" r="18" fill="#0b0f19"/>
  </g>

  <!-- Monitor -->
  <path d="M 750 600 L 850 600 L 830 580 L 760 580 Z" fill="#0b0f19" />
  <rect x="790" y="500" width="20" height="80" fill="#1e293b" />
  <polygon points="760,500 850,480 850,150 760,180" fill="#0b0f19" stroke="#38bdf8" stroke-width="2"/>
  <polygon points="765,490 840,470 840,165 765,190" fill="#082f49" filter="url(#glow)" />
  <!-- Screen Content -->
  <g stroke="#38bdf8" stroke-width="4" stroke-linecap="round" opacity="0.8">
    <line x1="775" y1="220" x2="810" y2="210" class="code-line" />
    <line x1="775" y1="240" x2="825" y2="230" class="code-line" />
    <line x1="775" y1="260" x2="795" y2="255" class="code-line" />
    <line x1="775" y1="280" x2="830" y2="270" class="code-line" />
    <line x1="775" y1="300" x2="810" y2="290" class="code-line" />
    <line x1="775" y1="320" x2="800" y2="310" class="code-line" />
  </g>

  <!-- Keyboard Base -->
  <polygon points="480,600 720,600 680,550 520,550" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
  
  <!-- Keys (Glowing) -->
  <g opacity="0.9">
    <!-- Top row -->
    <polygon points="530,560 550,560 545,568 520,568" fill="#38bdf8" class="key-flash-1"/>
    <polygon points="560,560 580,560 575,568 550,568" fill="#f472b6" class="key-flash-2"/>
    <polygon points="590,560 610,560 605,568 580,568" fill="#818cf8" class="key-flash-3"/>
    <polygon points="620,560 640,560 635,568 610,568" fill="#38bdf8" class="key-flash-4"/>
    <polygon points="650,560 670,560 665,568 640,568" fill="#f472b6" class="key-flash-1"/>
    <!-- Bottom row -->
    <polygon points="510,580 540,580 530,592 495,592" fill="#818cf8" class="key-flash-4"/>
    <polygon points="550,580 580,580 570,592 535,592" fill="#38bdf8" class="key-flash-2"/>
    <polygon points="590,580 620,580 610,592 575,592" fill="#f472b6" class="key-flash-3"/>
    <polygon points="630,580 660,580 650,592 615,592" fill="#38bdf8" class="key-flash-1"/>
    <polygon points="670,580 700,580 690,592 655,592" fill="#818cf8" class="key-flash-2"/>
  </g>

  <!-- Monkey Tail -->
  <path d="M 220 550 C 100 550, 50 400, 150 350 C 200 320, 250 400, 180 450" fill="none" stroke="#1e293b" stroke-width="26" stroke-linecap="round" class="tail"/>

  <!-- Monkey Body -->
  <path d="M 320 320 C 220 350, 180 480, 200 600 L 380 600 C 420 500, 380 380, 320 320 Z" fill="#1e293b" />
  <path d="M 320 350 C 360 400, 380 500, 340 600 L 380 600 C 420 500, 380 380, 320 320 Z" fill="#334155" />

  <!-- Monkey Head Group (Animated) -->
  <g class="head">
    <!-- Cranium -->
    <circle cx="320" cy="260" r="65" fill="#1e293b" />
    <!-- Brow ridge -->
    <path d="M 340 215 Q 380 220 395 245" fill="none" stroke="#1e293b" stroke-width="20" stroke-linecap="round"/>
    <!-- Muzzle/Snout -->
    <path d="M 360 250 C 420 250, 430 280, 420 320 L 350 320 Z" fill="#334155" />
    <!-- Nostril -->
    <circle cx="410" cy="275" r="4" fill="#0f172a" />
    <!-- Ear -->
    <circle cx="260" cy="270" r="28" fill="#1e293b"/>
    <circle cx="260" cy="270" r="14" fill="#0f172a"/>
    <!-- Eye (Glowing) -->
    <path d="M 365 250 Q 375 255 385 245" fill="none" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" filter="url(#glow-small)" class="eye"/>
    <!-- Cyber Implant / Headband Detail -->
    <path d="M 240 230 L 340 210" stroke="#f472b6" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <circle cx="240" cy="230" r="6" fill="#f472b6" filter="url(#glow-small)"/>
  </g>

  <!-- Right Arm (Foreground) -->
  <g class="arm-right">
    <path d="M 350 360 L 460 490 L 600 580" fill="none" stroke="#334155" stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="600" cy="580" r="22" fill="#334155"/>
    <path d="M 350 360 L 460 490 L 600 580" fill="none" stroke="#475569" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Bonfire Particles (Tokens/Poetry) -->
  <g class="bonfire" filter="url(#glow-small)">
    <text class="p p1" x="550" y="550">AI</text>
    <text class="p p2" x="580" y="560">詩</text>
    <text class="p p3" x="520" y="540">?</text>
    <text class="p p4" x="620" y="570">Token</text>
    <text class="p p5" x="560" y="550">夢</text>
    <text class="p p6" x="590" y="580">Loop</text>
    <text class="p p7" x="540" y="560">∞</text>
    <text class="p p8" x="610" y="550">0</text>
    <text class="p p9" x="570" y="540">1</text>
  </g>

</svg>
