<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Infinite Monkey</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f1117;
        color: #f4efe5;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(80, 126, 164, 0.24), transparent 34rem),
          linear-gradient(135deg, #0f1117 0%, #17191f 48%, #201b18 100%);
      }

      main {
        width: min(1040px, calc(100vw - 32px));
        display: grid;
        grid-template-columns: minmax(280px, 420px) 1fr;
        gap: 32px;
        align-items: center;
      }

      img {
        width: 100%;
        height: auto;
        display: block;
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(40px, 7vw, 88px);
        line-height: 0.92;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        max-width: 42rem;
        color: #d8d0c2;
        font-size: 18px;
        line-height: 1.7;
      }

      .tagline {
        margin-top: 22px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .tagline span {
        border: 1px solid rgba(244, 239, 229, 0.18);
        border-radius: 6px;
        padding: 8px 10px;
        color: #eadbb7;
        background: rgba(255, 255, 255, 0.04);
        font-size: 14px;
      }

      @media (max-width: 760px) {
        body {
          place-items: start center;
          padding: 28px 0;
        }

        main {
          grid-template-columns: 1fr;
          gap: 20px;
        }

        h1 {
          font-size: 44px;
        }

        p {
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="assets/monkey-typing.svg" alt="A monkey endlessly typing at a keyboard">
      <section>
        <h1>Infinite Monkey</h1>
        <p>一个讽刺 AI token 浪费的诗歌机器：骰子选择主题，程序抽取汉字，模型不停写诗，直到意义浓度被仪表盘宣布依然不足。</p>
        <div class="tagline" aria-label="project tags">
          <span>cc-switch proxy ready</span>
          <span>AI poetry loop</span>
          <span>token bonfire</span>
          <span>MIT</span>
        </div>
      </section>
    </main>
  </body>
</html>
